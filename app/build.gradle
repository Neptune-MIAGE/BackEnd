plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'jacoco'
    id "org.sonarqube" version "5.1.0.4882"
    id 'org.asciidoctor.jvm.convert' version '4.0.2'    // base de AsciiDoc
    id 'org.asciidoctor.jvm.pdf' version '4.0.2'        // puglin supplémentaire
}

jacoco {
    toolVersion = "0.8.12" // JaCoCo version
}

jacocoTestReport {
    reports {
        xml.required.set(true) // Necessary for badge services to read reports
        html.required.set(true)
    }
}

sonar {
  properties {
    property "sonar.projectKey", "Neptune-MIAGE_BackEnd"
    property "sonar.organization", "neptune-miage"
    property "sonar.host.url", "https://sonarcloud.io"
  }
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport // Generates JaCoCo report after testing
}

asciidoctor {
    sourceDir = file('src/docs/asciidoc')
    outputDir = file("${buildDir}/docs/asciidoc")
}

asciidoctorPdf {
    sourceDir = file('src/docs/asciidoc')
    outputDir = file("${buildDir}/docs/asciidoc")
}

asciidoctorj {
    requires 'rouge'
    modules {
        diagram.use()
        diagram.version '1.5.16'
    }
    attributes 'build-gradle': file('build.gradle'),
        'sourcedir': project.sourceSets.main.java.srcDirs[0],
        'source-highlighter': 'rouge',
        'rouge-style': 'github',
        'rouge-theme': 'github'
        
}

tasks.named('asciidoctor').configure {
    dependsOn tasks.named('asciidoctorPdf')
}

tasks.named('build').configure {
    dependsOn tasks.named('asciidoctor')
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit test framework.
    testImplementation libs.junit

    implementation 'org.springframework.boot:spring-boot-starter-web:3.3.3'

    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.3.3'

}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    } 
}


group = 'fr.parisnanterre.neptune'
version = '0.0.1'
application {
    // Define the main class for the application.
    mainClass = 'fr.parisnanterre.neptune.backend.App'
}
