plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'jacoco'
}

jacoco {
    toolVersion = "0.8.12" // JaCoCo version
}

jacocoTestReport {
    reports {
        xml.required.set(true) // Necessary for badge services to read reports
        html.required.set(true)
    }
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport // Generates JaCoCo report after testing
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit test framework.
    testImplementation libs.junit

    implementation 'org.springframework.boot:spring-boot-starter-web:3.3.3'

    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.3.3'

}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    } 
}


group = 'fr.parisnanterre.neptune'
version = '0.0.1'
application {
    // Define the main class for the application.
    mainClass = 'fr.parisnanterre.neptune.backend.App'
}
